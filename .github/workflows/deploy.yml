name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stage
          - production

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  OWNER_LC: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    outputs:
      api_image: ${{ steps.meta_api.outputs.tags }}
      worker_image: ${{ steps.meta_worker.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Metadata for API
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/e-learning-api
          tags: |
            type=sha
            type=raw,value=${{ inputs.environment }}-latest

      - name: Build and push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}

      - name: Metadata for Worker
        id: meta_worker
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.owner.outputs.value }}/e-learning-worker
          tags: |
            type=sha
            type=raw,value=${{ inputs.environment }}-latest

      - name: Build and push Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/worker/Dockerfile
          push: true
          tags: ${{ steps.meta_worker.outputs.tags }}
          labels: ${{ steps.meta_worker.outputs.labels }}

  deploy-api:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: build

    steps:
      - name: Deploy API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.API_HOST }}
          username: ${{ secrets.API_USER }}
          key: ${{ secrets.API_SSH_KEY }}
          script: |
            set -e

            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_READ_USER }}" --password-stdin

            mkdir -p /opt/${{ inputs.environment }}-api
            cd /opt/${{ inputs.environment }}-api

            cat > .env <<EOF
            SPRING_PROFILES_ACTIVE=${{ inputs.environment }}
            SERVER_PORT=8080
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=5432
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            VALKEY_HOST=${{ secrets.VALKEY_HOST }}
            VALKEY_PORT=6379
            VALKEY_PASSWORD=${{ secrets.VALKEY_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF

            cat > docker-compose.yml <<EOF
            services:
              api:
                image: ghcr.io/${{ github.repository_owner }}/e-learning-api:${{ inputs.environment }}-latest
                container_name: ${{ inputs.environment }}-api
                restart: unless-stopped
                env_file:
                  - .env
                ports:
                  - "127.0.0.1:8080:8080"
            EOF

            docker compose pull
            docker compose up -d

  deploy-worker:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    needs: build

    steps:
      - name: Deploy Worker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.WORKER_HOST }}
          username: ${{ secrets.WORKER_USER }}
          key: ${{ secrets.WORKER_SSH_KEY }}
          script: |
            set -e

            echo "${{ secrets.GHCR_READ_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_READ_USER }}" --password-stdin

            mkdir -p /opt/${{ inputs.environment }}-worker
            cd /opt/${{ inputs.environment }}-worker

            cat > .env <<EOF
            SPRING_PROFILES_ACTIVE=${{ inputs.environment }}
            DB_HOST=${{ secrets.DB_HOST }}
            DB_PORT=5432
            DB_NAME=${{ secrets.DB_NAME }}
            DB_USER=${{ secrets.DB_USER }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            VALKEY_HOST=${{ secrets.VALKEY_HOST }}
            VALKEY_PORT=6379
            VALKEY_PASSWORD=${{ secrets.VALKEY_PASSWORD }}
            EOF

            cat > docker-compose.yml <<EOF
            services:
              worker:
                image: ghcr.io/${{ github.repository_owner }}/e-learning-worker:${{ inputs.environment }}-latest
                container_name: ${{ inputs.environment }}-worker
                restart: unless-stopped
                env_file:
                  - .env
            EOF

            docker compose pull
            docker compose up -d