name: Deploy App

# Manual trigger from GitHub Actions UI.
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Deploy environment
        required: true
        type: choice
        options: [stage, prod]

# Minimal token permissions (good security baseline).
permissions:
  contents: read

# Prevent overlapping deploys for the same environment.
# Example groups: deploy-stage, deploy-prod
concurrency:
  group: deploy-${{ inputs.target_env }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Uses GitHub Environments ("stage"/"prod") so you can scope secrets per env.
    environment: ${{ inputs.target_env }}

    steps:
      # Pull repository source code into the runner.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      # Install JDK 25 (Temurin) and enable Gradle dependency cache.
      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # Build + test + create bootable jars.
      - name: Build
        run: ./gradlew clean test bootJar

      # Copy exactly one runnable API jar and one runnable Worker jar to stable names.
      # This avoids accidental deployment of "*-plain.jar".
      - name: Prepare artifacts deterministically
        shell: bash
        run: |
          shopt -s nullglob
          api_jars=(apps/api/build/libs/*.jar)
          worker_jars=(apps/worker/build/libs/*.jar)

          # Prefer runnable jar, avoid *-plain.jar
          api_jar=$(printf "%s\n" "${api_jars[@]}" | grep -v -- '-plain\.jar$' | head -n1)
          worker_jar=$(printf "%s\n" "${worker_jars[@]}" | grep -v -- '-plain\.jar$' | head -n1)

          [[ -n "${api_jar}" ]] || { echo "API jar not found"; exit 1; }
          [[ -n "${worker_jar}" ]] || { echo "Worker jar not found"; exit 1; }

          cp "${api_jar}" api.jar
          cp "${worker_jar}" worker.jar

      # Configure SSH key + known_hosts for secure non-interactive deployment.
      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Private key used by runner to SSH/SCP into droplets.
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Pre-verified host keys to prevent MITM on first connection.
          # Store one line per host in SSH_KNOWN_HOSTS secret.
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Deploy API jar and API env file, then repoint "current" symlink and restart service.
      - name: Deploy API
        shell: bash
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"

          # Create immutable release directory.
          ssh deploy@${{ secrets.API_HOST }} "mkdir -p /opt/e-learning/releases/${RELEASE_ID}"

          # Upload built artifact.
          scp api.jar deploy@${{ secrets.API_HOST }}:/opt/e-learning/releases/${RELEASE_ID}/api.jar

          # Write runtime environment file from secret (must include DB/Valkey vars).
          printf '%s\n' "${{ secrets.API_ENV_FILE }}" | ssh deploy@${{ secrets.API_HOST }} "cat > /opt/e-learning/.env && chmod 600 /opt/e-learning/.env"

          # Atomically switch current release and restart service.
          ssh deploy@${{ secrets.API_HOST }} "ln -sfn /opt/e-learning/releases/${RELEASE_ID} /opt/e-learning/current && sudo systemctl restart e-learning-api && sudo systemctl is-active --quiet e-learning-api"

      # Deploy Worker jar and Worker env file, then repoint "current" symlink and restart service.
      - name: Deploy Worker
        shell: bash
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"

          # Create immutable release directory.
          ssh deploy@${{ secrets.WORKER_HOST }} "mkdir -p /opt/e-learning/releases/${RELEASE_ID}"

          # Upload built artifact.
          scp worker.jar deploy@${{ secrets.WORKER_HOST }}:/opt/e-learning/releases/${RELEASE_ID}/worker.jar

          # Write runtime environment file from secret (must include DB/Valkey vars).
          printf '%s\n' "${{ secrets.WORKER_ENV_FILE }}" | ssh deploy@${{ secrets.WORKER_HOST }} "cat > /opt/e-learning/.env && chmod 600 /opt/e-learning/.env"

          # Atomically switch current release and restart service.
          ssh deploy@${{ secrets.WORKER_HOST }} "ln -sfn /opt/e-learning/releases/${RELEASE_ID} /opt/e-learning/current && sudo systemctl restart e-learning-worker && sudo systemctl is-active --quiet e-learning-worker"
