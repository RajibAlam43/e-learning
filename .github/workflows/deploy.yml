name: Deploy App

on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Deploy environment
        required: true
        type: choice
        options:
          - stage
          - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Build
        run: ./gradlew clean build

      - name: Prepare artifacts
        run: |
          cp apps/api/build/libs/*.jar api.jar
          cp apps/worker/build/libs/*.jar worker.jar

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.API_HOST }}" >> ~/.ssh/known_hosts
          ssh-keyscan -H "${{ secrets.WORKER_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy API
        run: |
          scp api.jar root@${{ secrets.API_HOST }}:/opt/e-learning/api.jar
          ssh root@${{ secrets.API_HOST }} "cat > /opt/e-learning/.env <<'EOF'
          ${{ secrets.API_ENV_FILE }}
          EOF
          chown deploy:deploy /opt/e-learning/.env
          chmod 600 /opt/e-learning/.env
          systemctl restart e-learning-api
          systemctl is-active --quiet e-learning-api"

      - name: Deploy Worker
        run: |
          scp worker.jar root@${{ secrets.WORKER_HOST }}:/opt/e-learning/worker.jar
          ssh root@${{ secrets.WORKER_HOST }} "cat > /opt/e-learning/.env <<'EOF'
          ${{ secrets.WORKER_ENV_FILE }}
          EOF
          chown deploy:deploy /opt/e-learning/.env
          chmod 600 /opt/e-learning/.env
          systemctl restart e-learning-worker
          systemctl is-active --quiet e-learning-worker"