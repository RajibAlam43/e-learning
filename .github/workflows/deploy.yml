name: Deploy App

# Manual trigger from GitHub Actions UI.
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Deploy environment
        required: true
        type: choice
        options: [stage, prod]

# Minimal token permissions (good security baseline).
permissions:
  contents: read

# Prevent overlapping deploys for the same environment.
# Example groups: deploy-stage, deploy-prod
concurrency:
  group: deploy-${{ inputs.target_env }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Uses GitHub Environments ("stage"/"prod") so you can scope secrets per env.
    environment: ${{ inputs.target_env }}

    steps:
      # Pull repository source code into the runner.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Install JDK 25 (Temurin) and enable Gradle dependency cache.
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # Build + test + create bootable jars.
      - name: Build
        run: ./gradlew clean test bootJar

      # Copy exactly one runnable API jar and one runnable Worker jar to stable names.
      # This avoids accidental deployment of "*-plain.jar".
      - name: Prepare artifacts deterministically
        shell: bash
        run: |
          shopt -s nullglob
          api_jars=(apps/api/build/libs/*.jar)
          worker_jars=(apps/worker/build/libs/*.jar)

          # Prefer runnable jar, avoid *-plain.jar
          api_jar=$(printf "%s\n" "${api_jars[@]}" | grep -v -- '-plain\.jar$' | head -n1)
          worker_jar=$(printf "%s\n" "${worker_jars[@]}" | grep -v -- '-plain\.jar$' | head -n1)

          [[ -n "${api_jar}" ]] || { echo "API jar not found"; exit 1; }
          [[ -n "${worker_jar}" ]] || { echo "Worker jar not found"; exit 1; }

          cp "${api_jar}" api.jar
          cp "${worker_jar}" worker.jar

      # Configure SSH key + known_hosts for secure non-interactive deployment.
      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Private key used by runner to SSH/SCP into droplets.
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Pre-verified host keys to prevent MITM on first connection.
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Deploy API jar and API env file, then repoint "current" symlink and restart service.
      - name: Deploy API
        shell: bash
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"

          # Create immutable release directory.
          ssh deploy@${{ vars.API_HOST }} "mkdir -p /opt/e-learning/releases/${RELEASE_ID}"

          # Upload built artifact.
          scp api.jar deploy@${{ vars.API_HOST }}:/opt/e-learning/releases/${RELEASE_ID}/api.jar

          # Write runtime environment file.
          cat <<'EOF' | ssh deploy@${{ vars.API_HOST }} "cat > /opt/e-learning/.env && chmod 600 /opt/e-learning/.env"
          SPRING_PROFILES_ACTIVE=${{ vars.SPRING_PROFILES_ACTIVE }}
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ vars.SPRING_DATASOURCE_USERNAME_API }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD_API }}
          SPRING_DATA_REDIS_HOST=${{ secrets.SPRING_DATA_REDIS_HOST }}
          SPRING_DATA_REDIS_PORT=${{ vars.SPRING_DATA_REDIS_PORT }}
          SPRING_DATA_REDIS_PASSWORD=${{ secrets.SPRING_DATA_REDIS_PASSWORD }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          APP_JWT_SECRET=${{ secrets.JWT_SECRET }}
          APP_JWT_ACCESS_TOKEN_EXPIRATION_MS=${{ vars.ACCESS_TOKEN_EXPIRATION }}
          MUX_ACCESS_TOKEN_ID=${{ secrets.MUX_ACCESS_TOKEN_ID }}
          MUX_SECRET_KEY=${{ secrets.MUX_SECRET_KEY }}
          MUX_SIGNING_KEY_ID=${{ secrets.MUX_SIGNING_KEY_ID }}
          MUX_SIGNING_SECRET_KEY=${{ secrets.MUX_SIGNING_SECRET_KEY }}
          MUX_TOKEN_TTL=${{ vars.MUX_TOKEN_TTL }}
          BUNNY_API_KEY=${{ secrets.BUNNY_API_KEY }}
          BUNNY_LIBRARY_ID=${{ secrets.BUNNY_LIBRARY_ID }}
          BUNNY_PULL_ZONE_HOSTNAME=${{ secrets.BUNNY_PULL_ZONE_HOSTNAME }}
          BUNNY_TOKEN_AUTH_KEY=${{ secrets.BUNNY_TOKEN_AUTH_KEY }}
          BUNNY_TOKEN_TTL=${{ vars.BUNNY_TOKEN_TTL }}
          EOF

          # Atomically switch current release and restart service.
          # Uses stop + start instead of restart to avoid restart timing weirdness.
          # Health check waits longer because Spring Boot startup can take time on small droplets.
          ssh deploy@${{ vars.API_HOST }} "
            set -e
  
            ln -sfn /opt/e-learning/releases/${RELEASE_ID} /opt/e-learning/current
  
            sudo /usr/bin/systemctl stop e-learning-api || true
            sleep 5
            sudo /usr/bin/systemctl start e-learning-api

            for i in {1..90}; do
              if curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'; then
                echo 'API is healthy.'
                exit 0
              fi
              sleep 5
            done

            echo 'API failed to become healthy.'
            systemctl status e-learning-api --no-pager || true
            sudo /usr/bin/journalctl -u e-learning-api -n 150 --no-pager
            exit 1
          "

      # Deploy Worker jar and Worker env file, then repoint "current" symlink and restart service.
      - name: Deploy Worker
        shell: bash
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"

          # Create immutable release directory.
          ssh deploy@${{ vars.WORKER_HOST }} "mkdir -p /opt/e-learning/releases/${RELEASE_ID}"

          # Upload built artifact.
          scp worker.jar deploy@${{ vars.WORKER_HOST }}:/opt/e-learning/releases/${RELEASE_ID}/worker.jar

          # Write runtime environment file.
          cat <<'EOF' | ssh deploy@${{ vars.WORKER_HOST }} "cat > /opt/e-learning/.env && chmod 600 /opt/e-learning/.env"
          SPRING_PROFILES_ACTIVE=${{ vars.SPRING_PROFILES_ACTIVE }}
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ vars.SPRING_DATASOURCE_USERNAME_WORKER }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD_WORKER }}
          SPRING_DATA_REDIS_HOST=${{ secrets.SPRING_DATA_REDIS_HOST }}
          SPRING_DATA_REDIS_PORT=${{ vars.SPRING_DATA_REDIS_PORT }}
          SPRING_DATA_REDIS_PASSWORD=${{ secrets.SPRING_DATA_REDIS_PASSWORD }}
          AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
          EOF

          # Atomically switch current release and restart service.          
          ssh deploy@${{ vars.WORKER_HOST }} "
            set -e

            ln -sfn /opt/e-learning/releases/${RELEASE_ID} /opt/e-learning/current
            sudo /usr/bin/systemctl restart e-learning-worker
            sleep 10
            sudo /usr/bin/systemctl is-active --quiet e-learning-worker
          "