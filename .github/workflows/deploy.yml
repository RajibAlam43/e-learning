name: Deploy App

# Manual trigger from GitHub Actions UI.
on:
  workflow_dispatch:
    inputs:
      target_env:
        description: Deploy environment
        required: true
        type: choice
        options: [stage, prod]

# Minimal token permissions.
permissions:
  contents: read

# Prevent overlapping deploys for the same environment.
# Example groups: deploy-stage, deploy-prod
concurrency:
  group: deploy-${{ inputs.target_env }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Uses GitHub Environments ("stage"/"prod") so secrets/vars are scoped per env.
    environment: ${{ inputs.target_env }}

    steps:
      # Pull repository source code into the runner.
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Install JDK 25 and enable Gradle dependency cache.
      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 25
          cache: gradle

      # Build + test + create bootable jars.
      - name: Build
        run: ./gradlew clean test bootJar

      # Copy exactly one runnable API jar and one runnable Worker jar to stable names.
      # This avoids accidentally deploying "*-plain.jar".
      - name: Prepare artifacts deterministically
        shell: bash
        run: |
          shopt -s nullglob

          api_jars=(apps/api/build/libs/*.jar)
          worker_jars=(apps/worker/build/libs/*.jar)

          api_jar=$(printf "%s\n" "${api_jars[@]}" | grep -v -- '-plain\.jar$' | head -n1)
          worker_jar=$(printf "%s\n" "${worker_jars[@]}" | grep -v -- '-plain\.jar$' | head -n1)

          [[ -n "${api_jar}" ]] || { echo "API jar not found"; exit 1; }
          [[ -n "${worker_jar}" ]] || { echo "Worker jar not found"; exit 1; }

          cp "${api_jar}" api.jar
          cp "${worker_jar}" worker.jar

      # Configure SSH key + known_hosts for secure non-interactive deployment.
      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Private key used by runner to SSH/SCP into droplets.
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Pre-verified host keys to prevent MITM on first connection.
          # Store one line per host in SSH_KNOWN_HOSTS secret.
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      # Upload the new API jar before running Flyway.
      # Important: Flyway must run from the new release jar, not /opt/e-learning/current/api.jar.
      # Otherwise old deployed code may run instead of the new migration scripts.
      - name: Upload API release artifact
        shell: bash
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"

          ssh deploy@${{ vars.API_HOST }} "mkdir -p /opt/e-learning/releases/${RELEASE_ID}"
          scp api.jar deploy@${{ vars.API_HOST }}:/opt/e-learning/releases/${RELEASE_ID}/api.jar

      # Run Flyway migration using the dedicated migration DB user.
      #
      # This starts the Spring Boot jar in non-web mode.
      # It does NOT start the API web server, but it does create enough of the Spring context
      # for Spring Boot's Flyway auto-configuration to run migrations.
      #
      # Best-practice DB separation:
      # - Migration user: allowed to change schema.
      # - API user: normal app runtime permissions only.
      # - Worker user: worker runtime permissions only.
      - name: Run Flyway migration from new API jar
        shell: bash
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"

          ssh deploy@${{ vars.API_HOST }} "
            SPRING_PROFILES_ACTIVE='${{ vars.SPRING_PROFILES_ACTIVE }}' \
            SPRING_MAIN_WEB_APPLICATION_TYPE=none \
            SPRING_FLYWAY_ENABLED=true \
            SPRING_FLYWAY_URL='${{ secrets.SPRING_DATASOURCE_URL }}' \
            SPRING_FLYWAY_USER='${{ vars.SPRING_DATASOURCE_USERNAME_MIGRATION }}' \
            SPRING_FLYWAY_PASSWORD='${{ secrets.SPRING_DATASOURCE_PASSWORD_MIGRATION }}' \
            SPRING_DATASOURCE_URL='' \
            SPRING_DATASOURCE_USERNAME='' \
            SPRING_DATASOURCE_PASSWORD='' \
            java -jar /opt/e-learning/releases/${RELEASE_ID}/api.jar
          "

      # Deploy API env file, then repoint "current" symlink and restart service.
      # This only happens if Flyway migration passes.
      - name: Activate API release
        shell: bash
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"

          # Write API runtime environment file.
          # Uses the dedicated API DB user, not the migration user.
          cat <<'EOF' | ssh deploy@${{ vars.API_HOST }} "cat > /opt/e-learning/.env && chmod 600 /opt/e-learning/.env"
          SPRING_PROFILES_ACTIVE=${{ vars.SPRING_PROFILES_ACTIVE }}
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ vars.SPRING_DATASOURCE_USERNAME_API }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD_API }}
          SPRING_FLYWAY_ENABLED=false
          SPRING_DATA_REDIS_HOST=${{ secrets.SPRING_DATA_REDIS_HOST }}
          SPRING_DATA_REDIS_PORT=${{ vars.SPRING_DATA_REDIS_PORT }}
          SPRING_DATA_REDIS_PASSWORD=${{ secrets.SPRING_DATA_REDIS_PASSWORD }}
          EOF

          # Atomically switch current release and restart API service.
          ssh deploy@${{ vars.API_HOST }} "
            ln -sfn /opt/e-learning/releases/${RELEASE_ID} /opt/e-learning/current &&
            sudo /usr/bin/systemctl restart e-learning-api &&
            for i in {1..24}; do
              if curl -fsS http://127.0.0.1:8080/actuator/health | grep -q '\"status\":\"UP\"'; then
                exit 0
              fi
              sleep 5
            done
            sudo journalctl -u e-learning-api -n 80 --no-pager
            exit 1
          "

      # Deploy Worker jar and Worker env file, then repoint "current" symlink and restart service.
      # This only happens after Flyway migration and API activation pass.
      - name: Deploy Worker
        shell: bash
        run: |
          RELEASE_ID="${GITHUB_SHA::12}"

          # Create immutable worker release directory.
          ssh deploy@${{ vars.WORKER_HOST }} "mkdir -p /opt/e-learning/releases/${RELEASE_ID}"

          # Upload built worker artifact.
          scp worker.jar deploy@${{ vars.WORKER_HOST }}:/opt/e-learning/releases/${RELEASE_ID}/worker.jar

          # Write Worker runtime environment file.
          # Uses the dedicated Worker DB user, not the API or migration user.
          cat <<'EOF' | ssh deploy@${{ vars.WORKER_HOST }} "cat > /opt/e-learning/.env && chmod 600 /opt/e-learning/.env"
          SPRING_PROFILES_ACTIVE=${{ vars.SPRING_PROFILES_ACTIVE }}
          SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
          SPRING_DATASOURCE_USERNAME=${{ vars.SPRING_DATASOURCE_USERNAME_WORKER }}
          SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD_WORKER }}
          SPRING_FLYWAY_ENABLED=false
          SPRING_DATA_REDIS_HOST=${{ secrets.SPRING_DATA_REDIS_HOST }}
          SPRING_DATA_REDIS_PORT=${{ vars.SPRING_DATA_REDIS_PORT }}
          SPRING_DATA_REDIS_PASSWORD=${{ secrets.SPRING_DATA_REDIS_PASSWORD }}
          EOF

          # Atomically switch current release and restart Worker service.
          ssh deploy@${{ vars.WORKER_HOST }} "
            ln -sfn /opt/e-learning/releases/${RELEASE_ID} /opt/e-learning/current &&
            sudo /usr/bin/systemctl restart e-learning-worker &&
            sleep 10 &&
            sudo /usr/bin/systemctl is-active --quiet e-learning-worker
          "