spring.profiles.active=local

spring.application.name=worker
spring.main.web-application-type=none

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# POSTGRES DB
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# VALKEY CACHE
spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD}

spring.flyway.enabled=false
email.jobs.main.queue=${EMAIL_JOBS_MAIN_QUEUE:gii-stage-email-jobs-queue}
spring.cloud.aws.sqs.listener.auto-startup=true

# SES
aws.ses.region=${AWS_SES_REGION:ap-southeast-1}
aws.ses.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.ses.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.ses.from-domain=${AWS_SES_FROM_DOMAIN:}
aws.ses.from-local-part=${AWS_SES_FROM_LOCAL_PART:no-reply}
